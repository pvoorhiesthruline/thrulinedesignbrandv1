<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thruline Design · Brand Pack v1.0</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Inter+Tight:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: #FAFAF7; color: #0B1220; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ============================================================
       BRAND COMPONENTS (brand-components.jsx)
       ============================================================ -->
  <script type="text/babel">
const C = {
  forestTeal:  '#0E6B5E',
  neoMint:     '#10B981',
  aquaFoam:    '#6EE7C7',
  navy:        '#1B1F4B',
  cobalt:      '#2D5BE3',
  sky:         '#5B9BF0',
  veriPeri:    '#6B4FD8',
  periwinkle:  '#A78BFA',
  blueIris:    '#3D4EBF',
  ink:         '#0B1220',
  inkDeep:     '#06091A',
  paper:       '#FAFAF7',
  paperWarm:   '#F3F1EA',
  paperDark:   '#0E1530',
  rule:        'rgba(11,18,32,0.08)',
  ruleDark:    'rgba(255,255,255,0.10)',
};
window.C = C;

const ThrulineMark = ({ size = 56, primary = C.veriPeri, accent = C.periwinkle, title = 'Thruline Design Mark' }) => {
  const barY=22,barH=8.74,arcLift=4.18,startX=10.27,endX=89.03,midX=(startX+endX)/2;
  const stemX=75.65,stemW=10.26,dotR=8.74;
  const t=(stemX-startX)/(endX-startX);
  const yAtStem=barY-4*arcLift*t*(1-t);
  const stemTop=yAtStem-barH/2;
  return (
    <svg width={size} height={size} viewBox="0 0 100 100" fill="none" role="img" aria-label={title} style={{display:'block'}}>
      <path d={`M ${startX} ${barY} Q ${midX} ${barY-2*arcLift}, ${endX} ${barY}`} stroke={primary} strokeWidth={barH} strokeLinecap="round" fill="none"/>
      <rect x={stemX-stemW/2} y={stemTop} width={stemW} height={90-stemTop} rx={stemW/2} fill={primary}/>
      <circle cx={startX} cy={barY} r={dotR} fill={accent}/>
    </svg>
  );
};
window.ThrulineMark = ThrulineMark;

const ThrulineFavicon = ({ size = 32, primary = C.veriPeri, accent = C.periwinkle }) => {
  const startX=3.3,endX=28.5,midX=(startX+endX)/2,barY=8,arcLift=1.34,barH=2.8,stemX=24.2,stemW=3.3,dotR=2.8;
  const t=(stemX-startX)/(endX-startX);
  const yAtStem=barY-4*arcLift*t*(1-t);
  const stemTop=yAtStem-barH/2;
  return (
    <svg width={size} height={size} viewBox="0 0 32 32" fill="none" style={{display:'block'}}>
      <path d={`M ${startX} ${barY} Q ${midX} ${barY-2*arcLift}, ${endX} ${barY}`} stroke={primary} strokeWidth={barH} strokeLinecap="round" fill="none"/>
      <rect x={stemX-stemW/2} y={stemTop} width={stemW} height={29-stemTop} rx={stemW/2} fill={primary}/>
      <circle cx={startX} cy={barY} r={dotR} fill={accent}/>
    </svg>
  );
};
window.ThrulineFavicon = ThrulineFavicon;

const ThrulineLockup = ({ size=48, color=C.ink, subColor, primary=C.veriPeri, accent=C.periwinkle }) => {
  const fs=size;
  const subAlpha=subColor?1:0.7;
  const subFill=subColor||color;
  const dotR=fs*0.115,barH=fs*0.115,stemW=fs*0.135,stemH=fs*0.78,arcLift=fs*0.055;
  const topPad=dotR+arcLift+fs*0.02;
  const barY=topPad,dotCx=dotR+fs*0.02,stemX=dotCx+fs*1.0,barEndExt=fs*0.18,barEndX=stemX+barEndExt;
  const barMidX=(dotCx+barEndX)/2;
  const tStem=(stemX-dotCx)/(barEndX-dotCx);
  const yAtStem=barY-4*arcLift*tStem*(1-tStem);
  const svgW=barEndX+barH,svgH=barY+stemH+barH/2;
  return (
    <div style={{display:'inline-flex',alignItems:'flex-start',fontFamily:'"Inter Tight",system-ui,sans-serif',lineHeight:1}}>
      <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`} style={{display:'block',flex:'0 0 auto',overflow:'visible'}}>
        <path d={`M ${dotCx} ${barY} Q ${barMidX} ${barY-2*arcLift}, ${barEndX} ${barY}`} stroke={primary} strokeWidth={barH} strokeLinecap="round" fill="none"/>
        <rect x={stemX-stemW/2} y={yAtStem-barH/2} width={stemW} height={stemH+barH/2} rx={stemW/2} fill={primary}/>
        <circle cx={dotCx} cy={barY} r={dotR} fill={accent}/>
      </svg>
      <span style={{fontSize:fs,fontWeight:600,letterSpacing:'-0.025em',color,marginLeft:-fs*0.08,marginTop:yAtStem-fs*0.215,whiteSpace:'nowrap'}}>
        hruline<span style={{fontWeight:300,color:subFill,opacity:subAlpha,marginLeft:'0.30em'}}>Design</span>
      </span>
    </div>
  );
};
window.ThrulineLockup = ThrulineLockup;

const ThrulineStacked = ({ size=48, color=C.ink, subColor, primary=C.veriPeri, accent=C.periwinkle }) => {
  const fs=size,subAlpha=subColor?1:0.7,subFill=subColor||color,lineGap=fs*0.12;
  const dotR=fs*0.115,barH=fs*0.115,stemW=fs*0.135,stemH=fs*0.78,arcLift=fs*0.055;
  const topPad=dotR+arcLift+fs*0.02;
  const barY=topPad,dotCx=dotR+fs*0.02,stemX=dotCx+fs*1.0,barEndExt=fs*0.18,barEndX=stemX+barEndExt;
  const barMidX=(dotCx+barEndX)/2;
  const tStem=(stemX-dotCx)/(barEndX-dotCx);
  const yAtStem=barY-4*arcLift*tStem*(1-tStem);
  const svgW=barEndX+barH,svgH=barY+stemH+barH/2;
  return (
    <div style={{display:'inline-flex',alignItems:'flex-start',fontFamily:'"Inter Tight",system-ui,sans-serif',lineHeight:1}}>
      <svg width={svgW} height={svgH} viewBox={`0 0 ${svgW} ${svgH}`} style={{display:'block',flex:'0 0 auto',overflow:'visible'}}>
        <path d={`M ${dotCx} ${barY} Q ${barMidX} ${barY-2*arcLift}, ${barEndX} ${barY}`} stroke={primary} strokeWidth={barH} strokeLinecap="round" fill="none"/>
        <rect x={stemX-stemW/2} y={yAtStem-barH/2} width={stemW} height={stemH+barH/2} rx={stemW/2} fill={primary}/>
        <circle cx={dotCx} cy={barY} r={dotR} fill={accent}/>
      </svg>
      <div style={{marginLeft:-fs*0.08,marginTop:yAtStem-fs*0.215,display:'flex',flexDirection:'column',gap:lineGap}}>
        <span style={{fontSize:fs,fontWeight:600,letterSpacing:'-0.025em',color,lineHeight:1,whiteSpace:'nowrap'}}>hruline</span>
        <span style={{fontSize:fs,fontWeight:300,letterSpacing:'-0.025em',color:subFill,opacity:subAlpha,lineHeight:1,whiteSpace:'nowrap'}}>Design</span>
      </div>
    </div>
  );
};
window.ThrulineStacked = ThrulineStacked;

const ThrulineWordmark = ({ size=48, color=C.ink, subColor }) => {
  const subFill=subColor||color,subAlpha=subColor?1:0.7;
  return (
    <span style={{fontFamily:'"Inter Tight",system-ui,sans-serif',fontSize:size,fontWeight:600,letterSpacing:'-0.025em',color,lineHeight:1,whiteSpace:'nowrap'}}>
      Thruline<span style={{fontWeight:300,color:subFill,opacity:subAlpha,marginLeft:'0.30em'}}>Design</span>
    </span>
  );
};
window.ThrulineWordmark = ThrulineWordmark;

const LogoFrame = ({ children, dark=false, label, code, style={} }) => (
  <div style={{background:dark?C.paperDark:C.paper,borderRadius:6,border:dark?`1px solid ${C.ruleDark}`:`1px solid ${C.rule}`,padding:'40px 32px 28px',display:'flex',flexDirection:'column',justifyContent:'space-between',minHeight:200,...style}}>
    <div style={{display:'flex',alignItems:'center',justifyContent:'center',flex:1,padding:'12px 0 24px'}}>{children}</div>
    <div style={{display:'flex',alignItems:'baseline',justifyContent:'space-between',paddingTop:14,borderTop:dark?`1px solid ${C.ruleDark}`:`1px solid ${C.rule}`}}>
      <span style={{fontFamily:'"Inter",system-ui,sans-serif',fontSize:13,fontWeight:500,color:dark?'#E5E7EB':C.ink,letterSpacing:'-0.01em'}}>{label}</span>
      <span style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:10,letterSpacing:'0.10em',textTransform:'uppercase',color:dark?'#7C86A8':'#6B7280'}}>{code}</span>
    </div>
  </div>
);
window.LogoFrame = LogoFrame;

const SectionHead = ({ num, kicker, title, intro }) => (
  <div style={{marginBottom:56}}>
    <div style={{display:'flex',alignItems:'baseline',gap:18,marginBottom:18}}>
      <span style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:11,letterSpacing:'0.16em',textTransform:'uppercase',color:C.veriPeri,fontWeight:500}}>{num} · {kicker}</span>
      <div style={{flex:1,height:1,background:C.rule}}/>
    </div>
    <h2 style={{fontFamily:'"Inter Tight",system-ui,sans-serif',fontSize:56,fontWeight:600,letterSpacing:'-0.028em',color:C.ink,margin:0,lineHeight:1.02,maxWidth:900,textWrap:'pretty'}}>{title}</h2>
    {intro&&<p style={{fontFamily:'"Inter",system-ui,sans-serif',fontSize:17,fontWeight:400,lineHeight:1.55,color:'rgba(11,18,32,0.65)',marginTop:22,maxWidth:680,textWrap:'pretty'}}>{intro}</p>}
  </div>
);
window.SectionHead = SectionHead;
  </script>

  <!-- ============================================================
       PAGE SECTIONS 1–6 + APP
       ============================================================ -->
  <script type="text/babel">
/* global React, C, ThrulineMark, ThrulineFavicon, ThrulineLockup, ThrulineStacked, ThrulineWordmark, LogoFrame, SectionHead */

// ---- COVER ----
const Cover = () => (
  <section style={{background:C.paperWarm,padding:'120px 96px 96px',borderBottom:`1px solid ${C.rule}`,position:'relative',overflow:'hidden'}}>
    <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',pointerEvents:'none'}}>
      <defs><pattern id="coverdots" width="28" height="28" patternUnits="userSpaceOnUse"><circle cx="1" cy="1" r="1" fill={C.veriPeri} opacity="0.10"/></pattern></defs>
      <rect width="100%" height="100%" fill="url(#coverdots)"/>
    </svg>
    <div style={{position:'absolute',top:-200,right:-200,width:720,height:720,background:`radial-gradient(circle at center, ${C.periwinkle}55 0%, ${C.periwinkle}00 60%)`,pointerEvents:'none'}}/>
    <div style={{position:'absolute',left:0,right:0,top:326,height:1,background:`linear-gradient(to right, ${C.veriPeri}00 0%, ${C.veriPeri}40 12%, ${C.veriPeri}40 88%, ${C.veriPeri}00 100%)`,pointerEvents:'none'}}/>
    <div style={{position:'absolute',right:-64,bottom:-120,opacity:0.06,pointerEvents:'none'}}>
      <ThrulineMark size={520} primary={C.veriPeri} accent={C.veriPeri}/>
    </div>
    <div style={{position:'relative',display:'flex',justifyContent:'space-between',fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:11,letterSpacing:'0.16em',textTransform:'uppercase',color:'rgba(11,18,32,0.5)',marginBottom:140}}>
      <span>Thruline Design · Visual identity</span>
      <span>Brand pack v1.0 · May 2026</span>
    </div>
    <div style={{position:'relative',marginBottom:96}}><ThrulineLockup size={132}/></div>
    <div style={{position:'relative',display:'flex',gap:80,alignItems:'flex-start'}}>
      <div style={{flex:'0 0 280px'}}>
        <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:11,letterSpacing:'0.16em',textTransform:'uppercase',color:C.veriPeri,fontWeight:500,marginBottom:14}}>The meaning</div>
        <div style={{fontFamily:'"Inter Tight",system-ui,sans-serif',fontSize:28,fontWeight:500,letterSpacing:'-0.02em',lineHeight:1.15,color:C.ink,textWrap:'pretty'}}>The connecting thread running through theory, implementation, and outcomes.</div>
      </div>
      <div style={{flex:1,maxWidth:620}}>
        <p style={{fontFamily:'"Inter",system-ui,sans-serif',fontSize:17,fontWeight:400,lineHeight:1.6,color:'rgba(11,18,32,0.72)',margin:0,textWrap:'pretty'}}>
          Thruline Design is an R&amp;D firm pairing AI agents and workshop practice with deep evaluation and change-management expertise. The identity is built around one idea — a throughline. A horizontal line carries through the T of the wordmark and extends past it, signaling continuity, intentional craft, and the firm's role as the connecting tissue between research and outcome.
        </p>
      </div>
    </div>
  </section>
);

// ---- ANATOMY ----
const Anatomy = () => {
  const annot = () => ({fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(11,18,32,0.55)',fontWeight:500});
  return (
    <section style={{padding:'120px 96px',background:C.paper,borderBottom:`1px solid ${C.rule}`}}>
      <SectionHead num="01" kicker="Anatomy" title="One continuous line, carrying through." intro="The mark is a custom T whose crossbar extends past the stem to the left, terminating in an accent dot. The line implies continuation — the throughline carries on past the frame."/>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:64,alignItems:'center'}}>
        <div style={{background:C.paperWarm,borderRadius:8,padding:48,position:'relative',aspectRatio:'1 / 1',display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden'}}>
          <svg style={{position:'absolute',inset:0,width:'100%',height:'100%',opacity:0.5}}>
            <defs><pattern id="agrid" width="32" height="32" patternUnits="userSpaceOnUse"><path d="M 32 0 L 0 0 0 32" fill="none" stroke="rgba(11,18,32,0.06)" strokeWidth="1"/></pattern></defs>
            <rect width="100%" height="100%" fill="url(#agrid)"/>
          </svg>
          <svg viewBox="0 0 110 100" style={{position:'relative',width:'90%',height:'auto',overflow:'visible'}}>
            <path d="M 10.27 22 Q 49.65 13.65, 89.03 22" stroke={C.veriPeri} strokeWidth="8.74" strokeLinecap="round" fill="none"/>
            <rect x="70.52" y="15.49" width="10.26" height="74.51" rx="5.13" fill={C.veriPeri}/>
            <circle cx="10.27" cy="22" r="8.74" fill={C.periwinkle}/>
            <line x1="49.65" y1="17.82" x2="49.65" y2="4" stroke={C.ink} strokeWidth="0.25" strokeDasharray="0.7 1"/>
            <circle cx="49.65" cy="17.82" r="0.7" fill={C.ink}/>
            <text x="49.65" y="2" fontFamily='"JetBrains Mono",monospace' fontSize="3" fontWeight="500" letterSpacing="0.4" textAnchor="middle" fill={C.ink}>BOWED CROSSBAR</text>
            <line x1="80.78" y1="55" x2="105" y2="55" stroke={C.ink} strokeWidth="0.25" strokeDasharray="0.7 1"/>
            <circle cx="80.78" cy="55" r="0.7" fill={C.ink}/>
            <text x="106" y="56.1" fontFamily='"JetBrains Mono",monospace' fontSize="3" fontWeight="500" letterSpacing="0.4" fill={C.ink}>STEM</text>
            <line x1="19" y1="27" x2="4" y2="44" stroke={C.ink} strokeWidth="0.25" strokeDasharray="0.7 1"/>
            <circle cx="19" cy="27" r="0.7" fill={C.ink}/>
            <text x="1" y="47" fontFamily='"JetBrains Mono",monospace' fontSize="3" fontWeight="500" letterSpacing="0.4" fill={C.ink}>TERMINUS · DOT</text>
          </svg>
        </div>
        <div style={{display:'flex',flexDirection:'column',gap:36}}>
          {[['CROSSBAR','A gentle bowed line — a quadratic curve that lifts ~5% of the cap height at the midpoint. Extends past the T stem on the right to imply continuity beyond the mark.'],['STEM','Hangs from the crossbar where the curve passes overhead. Same stroke weight as the bar; rounded ends.'],['TERMINUS',"Accent dot in Periwinkle Bloom at the bar's leading endpoint. The line emerges from inside the dot — the dot is the source."],['STROKE','Crossbar and stem share one weight. Corner radius = half stroke (fully rounded ends).']].map(([k,v])=>(
            <div key={k} style={{display:'grid',gridTemplateColumns:'120px 1fr',gap:24,alignItems:'baseline'}}>
              <span style={annot()}>{k}</span>
              <span style={{fontFamily:'"Inter",system-ui,sans-serif',fontSize:16,lineHeight:1.5,color:C.ink,textWrap:'pretty'}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

// ---- LOGO FAMILY ----
const LogoFamily = () => {
  const renderRow = (dark) => (
    <div style={{display:'grid',gridTemplateColumns:'1.6fr 1fr 0.7fr',gap:16}}>
      <LogoFrame dark={dark} label="Primary horizontal" code="A · Lockup" style={{gridRow:'span 2'}}>
        <ThrulineLockup size={60} color={dark?C.paper:C.ink} primary={dark?C.periwinkle:C.veriPeri} accent={dark?C.veriPeri:C.periwinkle}/>
      </LogoFrame>
      <LogoFrame dark={dark} label="Stacked" code="B · Stacked">
        <ThrulineStacked size={42} color={dark?C.paper:C.ink} primary={dark?C.periwinkle:C.veriPeri} accent={dark?C.veriPeri:C.periwinkle}/>
      </LogoFrame>
      <LogoFrame dark={dark} label="Mark" code="C · Symbol">
        <ThrulineMark size={88} primary={dark?C.periwinkle:C.veriPeri} accent={dark?C.veriPeri:C.periwinkle}/>
      </LogoFrame>
      <LogoFrame dark={dark} label="Wordmark" code="D · Type">
        <ThrulineWordmark size={40} color={dark?C.paper:C.ink}/>
      </LogoFrame>
      <LogoFrame dark={dark} label="Favicon" code="E · 32px">
        <ThrulineFavicon size={56} primary={dark?C.periwinkle:C.veriPeri} accent={dark?C.veriPeri:C.periwinkle}/>
      </LogoFrame>
    </div>
  );
  return (
    <section style={{padding:'120px 96px',background:C.paper,borderBottom:`1px solid ${C.rule}`}}>
      <SectionHead num="02" kicker="Logo Family" title="Five lockups, one system." intro="Every variant comes from the same construction. Use the horizontal lockup as default; reach for stacked, mark, wordmark, or favicon only when the format demands it."/>
      <div style={{display:'flex',flexDirection:'column',gap:16}}>
        <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:11,letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(11,18,32,0.55)',marginBottom:4,fontWeight:500}}>On light · Veri Peri + Periwinkle on Paper</div>
        {renderRow(false)}
        <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:11,letterSpacing:'0.14em',textTransform:'uppercase',color:'rgba(11,18,32,0.55)',margin:'32px 0 4px',fontWeight:500}}>On dark · Periwinkle + Veri Peri on Deep Navy</div>
        {renderRow(true)}
      </div>
    </section>
  );
};

// ---- CLEAR SPACE ----
const ClearSpace = () => {
  const X=14,lockupSize=64;
  return (
    <section style={{padding:'120px 96px',background:C.paperWarm,borderBottom:`1px solid ${C.rule}`}}>
      <SectionHead num="03" kicker="Clear space & sizing" title="Give the mark room to carry through." intro="Clear space is measured as X — one stem-width. Keep this margin on all sides, free of other graphic elements. Minimum sizes ensure the dot and stem stay legible."/>
      <div style={{display:'grid',gridTemplateColumns:'1.4fr 1fr',gap:48}}>
        <div style={{background:C.paper,borderRadius:8,padding:'64px 56px',position:'relative',border:`1px solid ${C.rule}`}}>
          <div style={{border:`1px dashed ${C.veriPeri}`,padding:`${X*1.6}px ${X*2}px`,display:'inline-flex',position:'relative'}}>
            <ThrulineLockup size={lockupSize}/>
            <div style={{position:'absolute',top:-28,left:'50%',transform:'translateX(-50%)',fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:C.veriPeri,background:C.paper,padding:'0 8px'}}>1 X</div>
            <div style={{position:'absolute',left:-34,top:'50%',transform:'translateY(-50%)',fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:C.veriPeri,background:C.paper,padding:'4px 0',writingMode:'vertical-rl'}}>1 X</div>
          </div>
          <div style={{marginTop:36,fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:11,letterSpacing:'0.12em',textTransform:'uppercase',color:'rgba(11,18,32,0.55)'}}>X = stem width</div>
        </div>
        <div style={{background:C.paper,borderRadius:8,padding:'40px 40px',border:`1px solid ${C.rule}`,display:'flex',flexDirection:'column',gap:28}}>
          <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:11,letterSpacing:'0.14em',textTransform:'uppercase',color:C.veriPeri,fontWeight:500}}>Minimum sizes</div>
          {[{label:'Horizontal lockup',sub:'min. 140 px wide / 32 mm print',el:<ThrulineLockup size={20}/>},{label:'Stacked lockup',sub:'min. 120 px wide / 28 mm print',el:<ThrulineStacked size={18}/>},{label:'Mark',sub:'min. 24 px / 6 mm',el:<ThrulineMark size={36}/>},{label:'Favicon',sub:'min. 16 px (use simplified variant)',el:<ThrulineFavicon size={28}/>}].map((row,i)=>(
            <div key={i} style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:24,alignItems:'center',paddingBottom:i<3?24:0,borderBottom:i<3?`1px solid ${C.rule}`:'none'}}>
              <div style={{display:'flex',justifyContent:'flex-start'}}>{row.el}</div>
              <div>
                <div style={{fontFamily:'"Inter",system-ui,sans-serif',fontSize:14,fontWeight:600,color:C.ink,letterSpacing:'-0.01em'}}>{row.label}</div>
                <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:10,letterSpacing:'0.10em',textTransform:'uppercase',color:'rgba(11,18,32,0.55)',marginTop:4}}>{row.sub}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
};

// ---- COLORS ----
const ColorChip = ({ name, hex, role }) => {
  const r=parseInt(hex.slice(1,3),16)/255,g=parseInt(hex.slice(3,5),16)/255,b=parseInt(hex.slice(5,7),16)/255;
  const lum=0.299*r+0.587*g+0.114*b;
  const labelColor=lum>0.55?'rgba(11,18,32,0.78)':'rgba(250,250,247,0.88)';
  const subColor=lum>0.55?'rgba(11,18,32,0.55)':'rgba(250,250,247,0.62)';
  const rgb=`${Math.round(r*255)} ${Math.round(g*255)} ${Math.round(b*255)}`;
  return (
    <div style={{background:hex,borderRadius:6,padding:'22px 20px',minHeight:168,display:'flex',flexDirection:'column',justifyContent:'space-between'}}>
      <div style={{fontFamily:'"JetBrains Mono",ui-monospace,monospace',fontSize:10,letterSpacing:'0.14em',textTransform:'uppercase',color:subColor,fontWeight:500}}>{role}</div>

};

const AppIconSVG = ({ size=1024 }) => {
  const s=size/100;
  const barY=22*s,barH=8.74*s,arcLift=4.18*s,startX=10.27*s,endX=89.03*s;
  const midX=(startX+endX)/2,stemX=75.65*s,stemW=10.26*s,dotR=8.74*s;
  const t=(stemX-startX)/(endX-startX),yAtStem=barY-4*arcLift*t*(1-t),stemTop=yAtStem-barH/2;
  return (
    <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox={`0 0 ${size} ${size}`} fill="none">
      <rect width={size} height={size} rx={size*0.23} fill={C.veriPeri}/>
      <path d={`M ${startX} ${barY} Q ${midX} ${barY-2*arcLift} ${endX} ${barY}`} stroke={C.periwinkle} strokeWidth={barH} strokeLinecap="round" fill="none"/>
      <rect x={stemX-stemW/2} y={stemTop} width={stemW} height={size*0.9-stemTop} rx={stemW/2} fill={C.periwinkle}/>
      <circle cx={startX} cy={barY} r={dotR} fill={C.veriPeri}/>
    </svg>
  );
};

const downloadLogo = (filename, Component, props, asSVG) => {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'position:fixed;top:-9999px;left:-9999px;pointer-events:none';
  document.body.appendChild(wrap);
  const tmp = ReactDOM.createRoot(wrap);
  tmp.render(React.createElement(Component, props));
  setTimeout(() => {
    let svgStr;
    if (asSVG) {
      const svgEl = wrap.querySelector('svg');
      const ser = new XMLSerializer();
      svgStr = ser.serializeToString(svgEl);
      if (!svgStr.includes('xmlns="http://www.w3.org/2000/svg"'))
        svgStr = svgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
    } else {
      const el = wrap.firstChild;
      const r = el.getBoundingClientRect();
      const p = 8;
      const w = Math.ceil(r.width) + p * 2, h = Math.ceil(r.height) + p * 2;
      const fontUrl = 'https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Inter+Tight:wght@300;400;500;600;700&amp;display=swap';
      svgStr = `<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="${w}" height="${h}"><defs><style>@import url('${fontUrl}');</style></defs><foreignObject x="0" y="0" width="${w}" height="${h}"><div xmlns="http://www.w3.org/1999/xhtml" style="padding:${p}px;line-height:1">${el.outerHTML}</div></foreignObject></svg>`;
    }
    tmp.unmount();
    wrap.remove();
    const blob = new Blob([svgStr], {type:'image/svg+xml'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = filename; a.click();
    URL.revokeObjectURL(url);
  }, 150);
};
